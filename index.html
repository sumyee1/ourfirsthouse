<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wynn & SumSum — House Hunt</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-background-primary:#FAFAF7;
  --color-background-secondary:#F2EEE8;
  --color-text-primary:#1E1C1A;
  --color-text-secondary:#7A7168;
  --color-border-tertiary:rgba(160,148,138,0.18);
  --color-border-secondary:rgba(160,148,138,0.32);
  --border-radius-md:6px;
  --border-radius-lg:10px;
  --font-sans:'DM Sans','Zen Kaku Gothic New',system-ui,sans-serif;
  --font-serif:'Shippori Mincho',serif;
  --accent:#8C7B9E;--accent-l:#F0ECF7;--accent-m:#C9BDD8;--accent-d:#5A4A70;
  --tv:#9490C4;--tv-l:#EFEEFC;--tv-d:#4A4680;
  --gd:#7A9E7E;--gd-l:#EBF4EC;--gd-d:#3A6040;
  --mb:#B8956A;--mb-l:#F8F0E6;--mb-d:#7A5A30;
  --ps:#B87070;--ps-l:#F8ECEC;--ps-d:#7A3838;
  --of:#7090B0;--of-l:#EAF0F8;--of-d:#384E68;
}
@media (prefers-color-scheme: dark){
  :root{
    --color-background-primary:#18181A;
    --color-background-secondary:#222228;
    --color-text-primary:#EDE8E0;
    --color-text-secondary:#9090A0;
    --color-border-tertiary:rgba(255,255,255,0.1);
    --color-border-secondary:rgba(255,255,255,0.18);
  }
}
body{font-family:var(--font-sans);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);min-height:100vh;letter-spacing:0.008em;font-weight:300}
.app{display:flex;flex-direction:column;max-width:900px;margin:0 auto;min-height:100vh;border-left:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary)}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary)}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;fill:white}
.logo-text{font-size:14px;font-weight:500;color:var(--color-text-primary);letter-spacing:0.01em;font-family:var(--font-serif)}
.logo-text span{color:var(--accent);font-style:italic}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:7px;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap}
.view-toggle{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.vt{padding:5px 11px;font-size:12px;background:none;border:none;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px;transition:all .12s;white-space:nowrap}
.vt svg{width:11px;height:11px;flex-shrink:0}
.vt.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.fsel{padding:5px 8px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.spacer{flex:1}
.cmp-btn{padding:5px 11px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-secondary);display:flex;align-items:center;gap:4px;white-space:nowrap}
.cmp-btn.active{background:var(--of-l);border-color:#B5D4F4;color:var(--of-d)}
.cmp-btn svg{width:11px;height:11px}
.add-prop-btn{padding:7px 14px;background:var(--accent);color:white;border:none;border-radius:var(--border-radius-md);font-size:12px;font-weight:400;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;letter-spacing:0.02em}
.add-prop-btn svg{width:11px;height:11px}

/* STATS */
.stats-row{display:flex;gap:5px;padding:7px 14px;border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap;align-items:center}
.spill{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary)}
.sdot{width:5px;height:5px;border-radius:50%}
.cmp-hint{margin-left:auto;font-size:11px;padding:2px 9px;border-radius:20px;border:0.5px solid #B5D4F4;background:var(--of-l);color:var(--of-d);cursor:pointer}

/* LIST */
.list-view{padding:10px 14px;display:flex;flex-direction:column;gap:7px}
.prop-row{display:flex;gap:12px;padding:13px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);cursor:pointer;transition:all .15s;position:relative}
.prop-row:hover{border-color:var(--color-border-secondary)}
.prop-row.cmp-sel{border:2px solid var(--of);background:var(--of-l)}
.prop-thumb{width:72px;height:58px;border-radius:var(--border-radius-md);overflow:hidden;flex-shrink:0;border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center}
.prop-thumb img{width:100%;height:100%;object-fit:cover}
.prop-thumb svg{width:20px;height:20px;opacity:.22}
.prop-main{flex:1;min-width:0}
.prop-addr{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;font-family:var(--font-serif)}
.prop-sub{font-size:11px;color:var(--color-text-secondary);display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px}
.prop-price{font-size:13px;font-weight:500;margin-bottom:3px}
.prop-tags-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-top:2px}
.tag{font-size:10px;padding:2px 7px;border-radius:10px;white-space:nowrap}
.tag.toview{background:var(--tv-l);color:var(--tv-d)}
.tag.good{background:var(--gd-l);color:var(--gd-d)}
.tag.maybe{background:var(--mb-l);color:var(--mb-d)}
.tag.pass{background:var(--ps-l);color:var(--ps-d)}
.tag.offer{background:var(--of-l);color:var(--of-d)}
.area-tag{font-size:10px;padding:2px 7px;border-radius:10px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);white-space:nowrap}
.stars{display:flex;gap:1px}
.star{font-size:10px;color:var(--color-border-secondary)}
.star.on{color:#BA7517}
.pc-counts{display:flex;gap:4px;margin-top:2px}
.pcc{font-size:10px;padding:1px 6px;border-radius:8px}
.pcc.p{background:var(--gd-l);color:var(--gd-d)}
.pcc.c{background:var(--ps-l);color:var(--ps-d)}
.prop-actions{display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.icon-btn{width:24px;height:24px;border-radius:5px;border:0.5px solid var(--color-border-tertiary);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary)}
.icon-btn:hover{background:var(--color-background-secondary)}
.icon-btn svg{width:11px;height:11px}
.cmp-badge{position:absolute;top:7px;right:7px;width:16px;height:16px;border-radius:50%;background:var(--of);color:white;font-size:9px;font-weight:500;display:flex;align-items:center;justify-content:center}
.empty-state{text-align:center;padding:60px 16px;color:var(--color-text-secondary)}
.empty-state svg{width:40px;height:40px;opacity:.15;margin:0 auto 12px;display:block}
.empty-state p{font-size:13px;margin-bottom:16px}
.empty-state button{padding:8px 18px;background:var(--accent);color:white;border:none;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;font-family:var(--font-sans)}

/* MAP */
.map-container{display:none}
#real-map{height:calc(100vh - 160px);min-height:400px;width:100%}

/* AREAS VIEW */
.areas-view{display:none;padding:10px 14px}
.areas-topbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.areas-topbar h3{font-size:13px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-serif)}
.manage-areas-btn{padding:4px 10px;font-size:11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-secondary)}
.area-group{margin-bottom:10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.area-group-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--color-background-secondary);cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.area-group-hdr:hover{background:var(--color-background-primary)}
.area-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.area-group-name{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;font-family:var(--font-serif)}
.area-count{font-size:11px;color:var(--color-text-secondary)}
.area-chevron{width:14px;height:14px;color:var(--color-text-secondary);transition:transform .15s}
.area-chevron.open{transform:rotate(90deg)}
.area-prop-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer}
.area-prop-row:last-child{border-bottom:none}
.area-prop-row:hover{background:var(--color-background-secondary)}
.area-prop-thumb{width:36px;height:30px;border-radius:5px;overflow:hidden;flex-shrink:0;border:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;background:var(--color-background-secondary)}
.area-prop-thumb img{width:100%;height:100%;object-fit:cover}
.area-prop-thumb svg{width:14px;height:14px;opacity:.2}
.area-prop-info{flex:1;min-width:0}
.area-prop-addr{font-size:12px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.area-prop-sub{font-size:10px;color:var(--color-text-secondary)}
.area-prop-price{font-size:12px;font-weight:500;flex-shrink:0}
.untagged-hdr{font-size:11px;color:var(--color-text-secondary);padding:6px 2px;font-weight:500}

/* COMPARE */
.cmp-view{display:none;padding:14px}
.cmp-table{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.cmp-hrow{display:grid;border-bottom:0.5px solid var(--color-border-secondary)}
.cmp-hcell{padding:10px;text-align:center}
.cmp-thumb{width:100%;height:64px;border-radius:6px;overflow:hidden;margin-bottom:6px;background:var(--color-background-secondary);display:flex;align-items:center;justify-content:center}
.cmp-thumb img{width:100%;height:100%;object-fit:cover}
.cmp-prop-name{font-size:12px;font-weight:500;color:var(--color-text-primary)}
.cmp-prop-price{font-size:13px;font-weight:500;margin-top:1px}
.cmp-row{display:grid;border-bottom:0.5px solid var(--color-border-tertiary)}
.cmp-row:last-child{border-bottom:none}
.cmp-cell{padding:8px 10px;font-size:12px;color:var(--color-text-primary)}
.cmp-cell.label{font-size:11px;color:var(--color-text-secondary);font-weight:500;background:var(--color-background-secondary);display:flex;align-items:flex-start;padding-top:10px}
.win{background:var(--gd-l);color:var(--gd-d);border-radius:3px;padding:1px 5px;font-size:10px}
.cmp-pc-list{display:flex;flex-direction:column;gap:2px}
.cpt{font-size:10px;padding:1px 5px;border-radius:6px}
.cpt.p{background:var(--gd-l);color:var(--gd-d)}
.cpt.c{background:var(--ps-l);color:var(--ps-d)}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:flex-start;justify-content:center;padding:40px 16px;z-index:1000;overflow-y:auto}
.overlay.open{display:flex}
.modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);width:100%;max-width:520px;margin:auto}
.mhdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:0.5px solid var(--color-border-tertiary)}
.mhdr h3{font-size:14px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-serif)}
.mclose{width:28px;height:28px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--color-text-secondary);font-size:18px;display:flex;align-items:center;justify-content:center}
.mbody{padding:16px;display:flex;flex-direction:column;gap:10px;max-height:65vh;overflow-y:auto}
.tabs{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);margin:-16px -16px 0}
.tab{padding:10px 14px;font-size:12px;font-weight:500;color:var(--color-text-secondary);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-pane{display:none;flex-direction:column;gap:10px;padding-top:12px}
.tab-pane.active{display:flex}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:11px;color:var(--color-text-secondary);font-weight:500}
.field input,.field select,.field textarea{padding:8px 10px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);width:100%;font-family:inherit}
.field textarea{resize:vertical;min-height:80px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.pc-st{font-size:11px;padding:4px 8px;border-radius:6px;display:none}
.pc-st.ok{display:block;background:var(--gd-l);color:var(--gd-d)}
.pc-st.err{display:block;background:var(--ps-l);color:var(--ps-d)}
.r-row{display:flex;gap:5px}
.r-star{font-size:20px;cursor:pointer;color:var(--color-border-secondary)}
.r-star.on{color:#BA7517}
.img-upload-area{border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:20px;text-align:center;cursor:pointer;background:var(--color-background-secondary)}
.img-upload-area:hover{border-color:var(--gd);background:var(--gd-l)}
.img-upload-area svg{width:24px;height:24px;opacity:.35;margin:0 auto 6px;display:block}
.img-upload-area p{font-size:12px;color:var(--color-text-secondary)}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.img-thumb-wrap{position:relative;aspect-ratio:1;border-radius:6px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.img-thumb-wrap img{width:100%;height:100%;object-fit:cover}
.img-del{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.55);border:none;cursor:pointer;color:white;font-size:12px;display:flex;align-items:center;justify-content:center}
.pc-section{display:flex;flex-direction:column;gap:5px}
.pc-hdr{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;margin-bottom:2px}
.pc-list{display:flex;flex-direction:column;gap:4px}
.pc-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.pc-item input{flex:1;border:none;background:none;font-size:12px;color:var(--color-text-primary);font-family:inherit;outline:none}
.pc-rm{width:18px;height:18px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);font-size:15px;display:flex;align-items:center;justify-content:center}
.pc-rm:hover{color:var(--ps)}
.pc-add{padding:5px 10px;font-size:11px;border:0.5px dashed var(--color-border-secondary);border-radius:5px;background:none;cursor:pointer;color:var(--color-text-secondary);text-align:left}
.area-chips-field{display:flex;flex-wrap:wrap;gap:5px;padding:7px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);min-height:36px}
.area-chip{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);background:var(--color-background-primary);transition:all .12s;white-space:nowrap}
.area-chip.sel{font-weight:500}
.area-chips-empty{font-size:11px;color:var(--color-text-secondary)}
.mftr{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;justify-content:flex-end}
.btn-s{padding:7px 14px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:none;cursor:pointer;color:var(--color-text-secondary)}
.btn-p{padding:7px 16px;font-size:12px;background:var(--accent);color:white;border:none;border-radius:var(--border-radius-md);cursor:pointer;font-weight:400;letter-spacing:0.02em}

/* AREA MANAGER */
.am-modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);width:100%;max-width:380px;margin:auto}
.am-list{display:flex;flex-direction:column}
.am-item{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.am-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.am-name{flex:1;font-size:13px;color:var(--color-text-primary)}
.am-count{font-size:11px;color:var(--color-text-secondary)}
.am-del{width:22px;height:22px;border:none;background:none;cursor:pointer;color:var(--color-text-secondary);border-radius:4px;display:flex;align-items:center;justify-content:center}
.am-del svg{width:11px;height:11px}
.am-add-row{display:flex;gap:6px;padding:10px 14px;border-top:0.5px solid var(--color-border-tertiary)}
.am-add-row input{flex:1;padding:7px 9px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:inherit}
.color-picker{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px 12px}
.cp-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.cp-dot.sel{border-color:var(--color-text-primary);transform:scale(1.1)}

/* DETAIL */
.d-modal{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);width:100%;max-width:500px;margin:auto}
.d-imgs{display:grid;border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0;overflow:hidden}
.d-img-item{display:flex;align-items:center;justify-content:center;overflow:hidden;aspect-ratio:16/9}
.d-img-item img{width:100%;height:100%;object-fit:cover}
.d-body{padding:16px}
.d-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:10px}
.d-addr{font-size:15px;font-weight:500;color:var(--color-text-primary)}
.d-price{font-size:14px;font-weight:500;margin-top:2px}
.d-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.dm{background:var(--color-background-secondary);border-radius:6px;padding:7px 9px}
.dm-l{font-size:10px;color:var(--color-text-secondary);margin-bottom:1px}
.dm-v{font-size:12px;color:var(--color-text-primary);font-weight:500}
.d-sec{margin-bottom:10px}
.d-sec-t{font-size:11px;color:var(--color-text-secondary);font-weight:500;margin-bottom:5px}
.d-proscons{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.d-pc-col{display:flex;flex-direction:column;gap:3px}
.d-pc-item{font-size:12px;padding:4px 8px;border-radius:5px;line-height:1.4}
.d-pc-item.pro{background:var(--gd-l);color:var(--gd-d)}
.d-pc-item.con{background:var(--ps-l);color:var(--ps-d)}
.d-notes{background:var(--color-background-secondary);border-radius:6px;padding:10px 11px;font-size:12px;color:var(--color-text-secondary);line-height:1.6;white-space:pre-wrap;min-height:32px}
.d-ftr{padding:12px 16px;border-top:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;align-items:center}
.del-btn{padding:6px 12px;font-size:12px;color:var(--ps);border:0.5px solid #F5C4B3;border-radius:6px;background:none;cursor:pointer}

.ldot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--gd);animation:pulse 1s infinite;vertical-align:middle}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

@keyframes twinkle{0%,100%{opacity:0.15;transform:scale(0.7)}50%{opacity:1;transform:scale(1.1)}}
@keyframes twinkle2{0%,100%{opacity:0.4;transform:scale(0.9) rotate(0deg)}50%{opacity:0.9;transform:scale(1.2) rotate(15deg)}}
@keyframes drift{0%,100%{transform:translateY(0px)}50%{transform:translateY(-3px)}}
@keyframes smokePuff{0%{transform:translateY(0) scale(1);opacity:0.35}100%{transform:translateY(-14px) scale(1.6);opacity:0}}
@keyframes walkBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}

.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

<div class="app">

<!-- PROPERTY MODAL -->
<div class="overlay" id="modal-wrap">

          <span class="r-star" data-v="4" onclick="setRating(4)">★</span>

      </div>

</div>
</div>

function renderMap(){const mc=document.getElementById('map-container');mc.style.display='block';const ps=fp().filter(p=>p.lat&&p.lng);if(!leafMap){leafMap=L.map('real-map',{zoomControl:true});L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(leafMap);}leafMarkers.forEach(m=>leafMap.removeLayer(m));leafMarkers=[];if(!ps.length){leafMap.setView([51.505,-0.09],12);return;}ps.forEach((p,i)=>{const sc=SC[p.status]||SC.good;const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="30" height="38" viewBox="0 0 30 38"><path d="M15 0C6.7 0 0 6.7 0 15c0 9.3 15 23 15 23S30 24.3 30 15C30 6.7 23.3 0 15 0z" fill="${sc.dot}"/><circle cx="15" cy="15" r="8" fill="white" fill-opacity="0.22"/><text x="15" y="19.5" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="system-ui">${i+1}</text></svg>`;const icon=L.divIcon({html:svg,className:'',iconSize:[30,38],iconAnchor:[15,38],popupAnchor:[0,-38]});const popup=`<div style="font-family:system-ui;min-width:160px"><div style="font-size:12px;font-weight:600;color:#111;margin-bottom:1px">${p.addr}</div><div style="font-size:13px;font-weight:600;color:${sc.dot};margin-bottom:3px">${p.price||'—'}</div><span style="font-size:10px;padding:1px 6px;border-radius:8px;background:${sc.bg};color:${sc.dark}">${SC[p.status].label}</span><button onclick="window._od('${p.id}')" style="margin-top:7px;width:100%;padding:4px;background:${sc.dot};color:white;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-family:system-ui">View details</button></div>`;const marker=L.marker([p.lat,p.lng],{icon}).addTo(leafMap);marker.bindPopup(popup,{maxWidth:200,closeButton:false});leafMarkers.push(marker);});const grp=L.featureGroup(leafMarkers);leafMap.fitBounds(grp.getBounds().pad(0.22));setTimeout(()=>leafMap.invalidateSize(),120);}

function renderAreas(){const av=document.getElementById('areas-view');const sf=document.getElementById('fsel').value;let html=`<div class="areas-topbar"><h3>Areas</h3><button class="manage-areas-btn" onclick="openAM()">Manage areas</button></div>`;if(!areas.length){html+=`<div class="empty-state" style="padding:32px 0"><p>No areas yet — click "Manage areas" to create your first</p></div>`;av.innerHTML=html;return;}areas.forEach(area=>{const ap=props.filter(p=>(p.areas||[]).includes(area.id)&&(!sf||p.status===sf));const isOpen=openGroups[area.id]!==false;html+=`<div class="area-group"><div class="area-group-hdr" onclick="toggleGroup('${area.id}')"><div class="area-color-dot" style="background:${area.color}"></div><span class="area-group-name">${area.name}</span><span class="area-count">${ap.length} propert${ap.length===1?'y':'ies'}</span><svg class="area-chevron${isOpen?' open':''}" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 3l4 4-4 4"/></svg></div>${isOpen?`<div>${ap.length?ap.map(p=>{const sc=SC[p.status]||SC.good;const img=p.images&&p.images.length?`<img src="${p.images[0]}" alt=""/>`:`<svg viewBox="0 0 24 24" fill="none" stroke="${sc.dot}" stroke-width="1.2" width="14" height="14"><path d="M2 20V10L12 2l10 8v10H16v-6h-4v6z"/></svg>`;return `<div class="area-prop-row" onclick="openDetail('${p.id}')"><div class="area-prop-thumb">${img}</div><div class="area-prop-info"><div class="area-prop-addr">${p.addr}</div><div class="area-prop-sub">${[p.type,p.beds?p.beds+' bed':null,p.date?fmtDate(p.date):null].filter(Boolean).join(' · ')}</div></div><span class="tag ${p.status}">${SC[p.status].label}</span><div class="area-prop-price" style="color:${sc.dot};margin-left:8px">${p.price||'—'}</div></div>`;}).join(''):`<div style="padding:14px 12px;font-size:12px;color:var(--color-text-secondary)">No properties in this area yet</div>`}</div>`:''}</div>`;});const untagged=props.filter(p=>(!p.areas||!p.areas.length)&&(!sf||p.status===sf)); function renderCmp(){const cv=document.getElementById('cmp-view');const ps=cmpSel.map(id=>props.find(p=>p.id===id)).filter(Boolean);if(ps.length<2){cv.innerHTML=`<div style="text-align:center;padding:40px;color:var(--color-text-secondary);font-size:13px">Select 2 properties in list view.<br><br><button class="btn-s" onclick="setView('list')">Back to list</button></div>`;return;}const cols=`110px ${ps.map(()=>'1fr').join(' ')}`;const parseP=p=>{if(!p.price)return 0;return parseInt(p.price.replace(/\D/g,''))||0;};const prices=ps.map(parseP);const minP=Math.min(...prices.filter(x=>x>0));const maxR=Math.max(...ps.map(x=>x.rating||0));const maxB=Math.max(...ps.map(x=>x.beds||0));const header=`<div class="cmp-hrow" style="display:grid;grid-template-columns:${cols}"><div></div>${ps.map(p=>{const sc=SC[p.status]||SC.good;const img=p.images&&p.images.length?`<img src="${p.images[0]}"/>`:`<svg viewBox="0 0 24 24" fill="none" stroke="${sc.dot}" stroke-width="1.2" width="24" height="24"><path d="M2 20V10L12 2l10 8v10H16v-6h-4v6z"/></svg>`;return `<div class="cmp-hcell"><div class="cmp-thumb">${img}</div><div class="cmp-prop-name">${p.addr}</div><div class="cmp-prop-price" style="color:${sc.dot}">${p.price||'—'}</div><span class="tag ${p.status}" style="margin-top:3px">${SC[p.status].label}</span></div>`;}).join('')}</div>`;const rows=[{l:'Price',f:p=>{const pr=parseP(p);return pr>0&&pr===minP&&prices.filter(x=>x>0&&x===minP).length===1?`<span class="win">${p.price}</span>`:p.price||'—';}},{l:'Rating',f:p=>{const s=[1,2,3,4,5].map(i=>`<span class="star${i<=(p.rating||0)?' on':''}">${i<=(p.rating||0)?'★':'☆'}</span>`).join('');return s+(p.rating===maxR&&maxR>0&&ps.filter(x=>(x.rating||0)===maxR).length===1?' <span class="win">top</span>':'');}},{l:'Status',f:p=>SC[p.status]?.label||p.status},{l:'Type',f:p=>p.type||'—'},{l:'Beds',f:p=>p.beds?(p.beds===maxB&&ps.filter(x=>(x.beds||0)===maxB).length===1?`<span class="win">${p.beds} bed</span>`:`${p.beds} bed`):'—'},{l:'Baths',f:p=>p. function closeDetail(){document.getElementById('detail-wrap').classList.remove('open');detailId=null;}
function doEdit(){const id=detailId;closeDetail();if(id)openEdit(id);}
function doDelete(){if(detailId)doDeleteId(detailId);closeDetail();}
function doDeleteId(id){if(confirm('Delete this property?')){props=props.filter(p=>p.id!==id);cmpSel=cmpSel.filter(x=>x!==id);save();render();if(currentView==='map'&&leafMap){leafMarkers.forEach(m=>leafMap.removeLayer(m));leafMarkers=[];renderMap();}}}
function openAM(){renderAMList();renderColorPicker();document.getElementById('am-wrap').classList.add('open');document.getElementById('am-input').focus();}
function closeAM(){document.getElementById('am-wrap').classList.remove('open');render();}
function renderAMList(){const list=document.getElementById('am-list');if(!areas.length){list.innerHTML=`<div style="padding:14px;font-size:12px;color:var(--color-text-secondary)">No areas yet — add your first below</div>`;return;}const counts={};props.forEach(p=>(p.areas||[]).forEach(aid=>{counts[aid]=(counts[aid]||0)+1;}));list.innerHTML=areas.map(a=>`<div class="am-item"><div class="am-dot" style="background:${a.color}"></div><span class="am-name">${a.name}</span><span class="am-count">${counts[a.id]||0} prop${(counts[a.id]||0)===1?'':'s'}</span><button class="am-del" onclick="deleteArea('${a.id}')"><svg viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="2.5" x2="10" y2="2.5"/><path d="M3 2.5V2h5v.5M4 4.5v3M7 4.5v3"/></svg></button></div>`).join('');}
function renderColorPicker(){document.getElementById('color-picker').innerHTML=`<span style="font-size:11px;color:var(--color-text-secondary);margin-right:4px;line-height:20px">Color:</span>`+AREA_COLORS.map(c=>`<div class="cp-dot${c===selColor?' sel':''}" style="background:${c}" onclick="setColor('${c}')"></div>`).join('');}
function setColor(c){selColor=c;renderColorPicker();}
function addArea(){const inp=document.getElementById('am-input');const name=inp.value.trim();if(!name)return;areas.push({id:gid(),name,color:selColor});inp.value='';save();renderAMList();refreshAreaChips&&refreshAreaChips();}
function deleteArea(id){if(confirm('Delete this area?')){areas=areas.filter(a=>a.id!==id);props=props.map(p=>({...p,areas:(p.areas||[]).filter(aid=>aid!==id)}));save();renderAMList();}}
load();render();
</script>

<div class="toast" id="save-toast">
  <svg viewBox="0 0 24 24" fill="none" style="width:16px;height:16px;flex-shrink:0">
    <circle cx="12" cy="12" r="10" fill="#7A9E7E" opacity="0.25"/>
    <circle cx="12" cy="12" r="10" fill="none" stroke="#7A9E7E" stroke-width="1.5"/>
    <path class="check-path" id="save-check" d="M7 12.5l3.5 3.5 6.5-7" fill="none" stroke="#7A9E7E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <g id="save-confetti">
      <circle class="confetti-piece" cx="4"  cy="8"  r="2"   fill="#C9BDD8"/>
      <rect   class="confetti-piece" x="18" y="5"  width="3" height="3" rx="0.5" fill="#E8C4A0" transform="rotate(20,19,6)"/>
      <circle class="confetti-piece" cx="20" cy="16" r="1.5" fill="#B0C8A8"/>
      <rect   class="confetti-piece" x="3"  y="14" width="2.5" height="2.5" rx="0.5" fill="#C9BDD8"/>
      <circle class="confetti-piece" cx="12" cy="3"  r="1.5" fill="#E8C4A0"/>
    </g>
  </svg>
  <span id="save-toast-text">已保存！</span>
</div>
<script>
function showSaveToast(){
  const toast=document.getElementById('save-toast');
  const check=document.getElementById('save-check');
  const confetti=document.querySelectorAll('#save-confetti .confetti-piece');
  const msgs=['已保存！','记下来啦 ✓','好房子！','加入心愿单 ✓'];
  document.getElementById('save-toast-text').textContent=msgs[Math.floor(Math.random()*msgs.length)];
  check.classList.remove('animate');
  confetti.forEach(c=>c.classList.remove('animate'));
  void check.offsetWidth;
  toast.classList.add('show');
  check.classList.add('animate');
  setTimeout(()=>confetti.forEach(c=>c.classList.add('animate')),300);
  setTimeout(()=>toast.classList.remove('show'),2600);
}
</script>

</body>
